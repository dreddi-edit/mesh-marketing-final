const { useState, useEffect, useRef } = React;

// ── colours
const C = {
  dark:   '#08111a',
  dark2:  '#0d1820',
  petrol: '#1a6b75',
  cyan:   '#00d4e8',
  magenta:'#c678dd',
  green:  '#4ec994',
  red:    '#ff5c6c',
  dim:    'rgba(255,255,255,0.25)',
  muted:  'rgba(255,255,255,0.45)',
  white:  'rgba(255,255,255,0.90)',
};

// ── helpers
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function ilerp(a, b, t) { return Math.max(0, Math.min(1, (t - a) / (b - a))); }
function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function fadeIn(t, a, b)  { return ease(ilerp(a, b, t)); }
function fadeOut(t, a, b) { return 1 - ease(ilerp(a, b, t)); }
function fade(t, fadeInA, fadeInB, fadeOutA, fadeOutB) {
  return Math.min(fadeIn(t, fadeInA, fadeInB), fadeOut(t, fadeOutA, fadeOutB));
}

// ── Terminal chrome wrapper

}

// ── Scene 2: The Problem (7-15s) ──────────────────────────────────────────
function Scene2() {
  const { localTime: t } = useSprite();
  const opacity = fade(t, 0, 0.8, 7, 8);

  const filesTotal = 247;
  const rawFit = 22;
  const fillProgress = ease(ilerp(1, 4.5, t));
  const rawFillPct = Math.min(1, fillProgress * (247 / rawFit)) * (rawFit / 247);
  const isOverflow = t > 3.2;

  // files appear as small dots
  const filesShown = Math.floor(lerp(0, filesTotal, ease(ilerp(0.5, 3, t))));

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', opacity, background: C.dark }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:80, alignItems:'center', maxWidth:1600, width:'100%', padding:'0 100px' }}>

        {/* Left: title */}
        <div>
          <div style={{ fontFamily:'Geist Mono', fontSize:12, letterSpacing:'0.12em', textTransform:'uppercase', color:C.cyan, marginBottom:16, opacity: fadeIn(t,0,0.8) }}>The Problem</div>

            The model never sees the rest.
          </div>
        </div>

        {/* Right: visualization */}
        <div style={{ display:'flex', flexDirection:'column', gap:32, opacity: fadeIn(t,0.5,1.5) }}>
          {/* File grid */}
          <div>
            <div style={{ fontFamily:'Geist Mono', fontSize:11, color:C.dim, marginBottom:10, letterSpacing:'0.06em' }}>YOUR WORKSPACE — {filesShown} files</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
              {Array.from({length: Math.min(filesShown, filesTotal)}).map((_, i) => (
                <div key={i} style={{
                  width: 10, height: 10, borderRadius: 2,
                  background: i < rawFit
                    ? (isOverflow ? C.green : 'rgba(0,212,232,0.6)')
                    : 'rgba(255,255,255,0.1)',
                  transition: 'background 0.3s',
                }} />
              ))}
            </div>
          </div>

          {/* Context window bar */}
          <div>
            <div style={{ fontFamily:'Geist Mono', fontSize:11, color:C.dim, marginBottom:8, letterSpacing:'0.06em' }}>AI CONTEXT WINDOW — 6,000 tokens</div>
            <div style={{ height:24, borderRadius:6, background:'rgba(255,255,255,0.05)', overflow:'hidden', position:'relative', border:`1px solid ${isOverflow ? 'rgba(255,92,108,0.5)' : 'rgba(255,255,255,0.08)'}` }}>
              <div style={{
                height:'100%', borderRadius:6,
                background: isOverflow
                  ? 'linear-gradient(90deg, rgba(255,92,108,0.7), rgba(255,92,108,0.4))'
                  : 'linear-gradient(90deg, rgba(0,212,232,0.5), rgba(0,212,232,0.3))',

            {isOverflow && (

                ⚠ Budget exhausted after 22 files — needle never reached

              <div style={{ fontFamily:'Barlow Condensed', fontStyle:'italic', fontWeight:900, fontSize:52, color:C.red, lineHeight:1 }}>22</div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.35)', marginTop:6 }}>files visible<br/>to the model</div>
            </div>
            <div style={{ background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:10, padding:'20px 20px' }}>

  return (

        <div>
          <div style={{ fontFamily:'Geist Mono', fontSize:12, letterSpacing:'0.12em', textTransform:'uppercase', color:C.cyan, marginBottom:16 }}>The Solution</div>

            Capsule<br/>Compress.

              { label: 'Ultra',  pct: 1.9,  color: C.cyan },

              { label: 'Loose',  pct: 20.6, color: '#3a7a8c' },
              { label: 'Raw',    pct: 100,  color: 'rgba(255,255,255,0.12)' },
            ].map(({ label, pct, color }) => (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:14 }}>
                <div style={{ fontFamily:'Geist Mono', fontSize:11, color:C.dim, width:52 }}>{label}</div>

              </div>

        {/* Right: visualization */}

          <div>

          {/* Gain card */}

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, opacity: fadeIn(t, 4, 5) }}>

                { num:'3.9×', label:'context gain', color:C.cyan },

  const opacity = fade(t, 0, 0.8, 7, 8);

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity, background: C.dark, gap:48 }}>

            <div style={{ fontFamily:'Geist Mono', fontSize:11, letterSpacing:'0.1em', textTransform:'uppercase', color:'rgba(255,92,108,0.6)', marginBottom:20 }}>Without Mesh — raw context</div>

              <div style={{ display:'flex', alignItems:'center', gap:16, opacity: fadeIn(t,4.2,5.0) }}>
                <div style={{ fontFamily:'Barlow Condensed', fontStyle:'italic', fontWeight:900, fontSize:72, color:C.cyan, lineHeight:1 }}>100%</div>
                <div style={{ fontSize:14, color:'rgba(0,212,232,0.7)' }}>recall<br/>5/5 configs pass</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Model badges */}
      {showStats && (
        <div style={{ display:'flex', gap:12, opacity: fadeIn(t, 5.5, 6.5) }}>
          {models.map(m => (
            <div key={m} style={{ fontFamily:'Geist Mono', fontSize:11, padding:'6px 14px', borderRadius:100, border:'1px solid rgba(0,212,232,0.2)', color:'rgba(0,212,232,0.55)' }}>{m}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Scene 5: Four Surfaces (29-38s) ────────────────────────────────────────
function Scene5() {
  const { localTime: t } = useSprite();
  const opacity = fade(t, 0, 0.8, 7.5, 8.5);

  const surfaces = [
    { num:'01', title:'Terminal CLI', desc:'npm install · auto-exec · local voice', tag:'anywhere you type', delay:0 },
    { num:'02', title:'Browser IDE', desc:'Monaco · PTY · AI chat · cloud voice', tag:'try-mesh.com', delay:0.4 },
    { num:'03', title:'MCP Server', desc:'Claude Code · Cursor · Windsurf', tag:'mesh_search', delay:0.8 },
    { num:'04', title:'Gateway API', desc:'REST endpoint · embed anywhere', tag:'POST /agent', delay:1.2 },
  ];

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity, background: C.dark, gap:56 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontFamily:'Geist Mono', fontSize:12, letterSpacing:'0.12em', textTransform:'uppercase', color:C.cyan, marginBottom:16 }}>One context engine</div>
        <div style={{ fontFamily:'Barlow Condensed', fontStyle:'italic', fontWeight:900, fontSize:80, lineHeight:0.9, letterSpacing:'-0.03em', color:'rgba(255,255,255,0.9)' }}>
          Four surfaces.
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16, maxWidth:1400, width:'100%', padding:'0 80px' }}>
        {surfaces.map(({ num, title, desc, tag, delay }) => (
          <div key={num} style={{
            background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:14, padding:'32px 28px',
            opacity: fadeIn(t, 0.5 + delay, 1.2 + delay),
            transform: `translateY(${lerp(20, 0, ease(ilerp(0.5 + delay, 1.2 + delay, t)))}px)`,
            position:'relative', overflow:'hidden',
          }}>
            <div style={{ position:'absolute', top:-16, right:12, fontFamily:'Barlow Condensed', fontStyle:'italic', fontWeight:900, fontSize:120, lineHeight:1, color:'rgba(255,255,255,0.025)', pointerEvents:'none' }}>{num}</div>
            <div style={{ fontFamily:'Geist Mono', fontSize:11, letterSpacing:'0.08em', color:'rgba(0,212,232,0.5)', textTransform:'uppercase', marginBottom:12 }}>{num}</div>
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:800, fontSize:28, letterSpacing:'-0.01em', color:'rgba(255,255,255,0.88)', marginBottom:10 }}>{title}</div>
            <div style={{ fontSize:14, color:'rgba(255,255,255,0.35)', lineHeight:1.6, fontWeight:300 }}>{desc}</div>
            <div style={{ marginTop:16, fontFamily:'Geist Mono', fontSize:11, color:C.cyan, background:'rgba(0,212,232,0.08)', padding:'4px 10px', borderRadius:4, display:'inline-block' }}>{tag}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── End card (37-40s) ──────────────────────────────────────────────────────
function EndCard() {
  const { localTime: t } = useSprite();
  const opacity = fadeIn(t, 0, 1.2);

  return (
    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity, background: C.dark, gap:24 }}>
      <img src="assets/brand/lockup-color.svg" alt="Mesh" style={{ width:220, height:'auto' }} />
      <div style={{ fontFamily:'DM Sans', fontSize:22, fontWeight:300, color:'rgba(255,255,255,0.35)', letterSpacing:'0.02em' }}>
        <span style={{ color:'rgba(255,255,255,0.75)' }}>Four surfaces.</span> One engine.
      </div>
      <div style={{ fontFamily:'Geist Mono', fontSize:13, color:'rgba(0,212,232,0.5)', marginTop:8 }}>try-mesh.com</div>
    </div>
  );
}

// ── Root animation
function MeshAnimation() {
  return (
    <Stage width={1920} height={1080} duration={40} background={C.dark}>
      <Sprite start={0}  end={8}><Scene1 /></Sprite>
      <Sprite start={7}  end={16}><Scene2 /></Sprite>
      <Sprite start={15} end={24}><Scene3 /></Sprite>
      <Sprite start={23} end={32}><Scene4 /></Sprite>
      <Sprite start={30} end={39}><Scene5 /></Sprite>
      <Sprite start={38} end={40}><EndCard /></Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MeshAnimation />);
</script>
</body>
</html>
