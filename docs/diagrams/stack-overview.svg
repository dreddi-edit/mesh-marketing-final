<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="gBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a1418"/>
      <stop offset="1" stop-color="#040a0d"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00b8d4"/>
      <stop offset="1" stop-color="#7ceeff"/>
    </linearGradient>
    <linearGradient id="gCore" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#00d4e8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00738a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="620" fill="url(#gBg)"/>

  <text x="550" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#fff" font-style="italic">The Mesh Engineering Stack</text>
  <text x="550" y="74" text-anchor="middle" font-size="13" fill="#7ceeff" letter-spacing="3">ONE ENGINE · FOUR SURFACES · UNIFIED CONTEXT</text>

  <g transform="translate(80, 120)">
    <g>
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0d1d23" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="100" y="32" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="2">SURFACE 01</text>
      <text x="100" y="60" text-anchor="middle" fill="#fff" font-size="22" font-weight="800" font-style="italic">CLI</text>
      <text x="100" y="82" text-anchor="middle" fill="#a0b8c0" font-size="11">Terminal Agent</text>
    </g>
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0d1d23" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="100" y="32" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="2">SURFACE 02</text>
      <text x="100" y="60" text-anchor="middle" fill="#fff" font-size="22" font-weight="800" font-style="italic">IDE</text>
      <text x="100" y="82" text-anchor="middle" fill="#a0b8c0" font-size="11">Desktop Workbench</text>
    </g>
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0d1d23" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="100" y="32" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="2">SURFACE 03</text>
      <text x="100" y="60" text-anchor="middle" fill="#fff" font-size="22" font-weight="800" font-style="italic">MCP</text>
      <text x="100" y="82" text-anchor="middle" fill="#a0b8c0" font-size="11">Agent Bridge</text>
    </g>
    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0d1d23" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="100" y="32" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="2">SURFACE 04</text>
      <text x="100" y="60" text-anchor="middle" fill="#fff" font-size="22" font-weight="800" font-style="italic">API</text>
      <text x="100" y="82" text-anchor="middle" fill="#a0b8c0" font-size="11">Gateway</text>
    </g>
  </g>

  <g stroke="url(#gCyan)" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.6">
    <path d="M 180 220 L 380 320"/>
    <path d="M 420 220 L 460 320"/>
    <path d="M 660 220 L 620 320"/>
    <path d="M 900 220 L 700 320"/>
  </g>

  <g transform="translate(370, 305)">
    <rect x="0" y="0" width="340" height="100" rx="14" fill="url(#gCore)" filter="url(#glow)"/>
    <text x="170" y="36" text-anchor="middle" fill="#001318" font-size="11" letter-spacing="3" font-weight="700">CAPSULE ENGINE</text>
    <text x="170" y="68" text-anchor="middle" fill="#001318" font-size="22" font-weight="900" font-style="italic">3.9× compression</text>
    <text x="170" y="86" text-anchor="middle" fill="#001318" font-size="11" opacity="0.75">Tree-sitter AST · 100% recall · Local-first</text>
  </g>

  <g transform="translate(80, 450)">
    <g>
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0a1418" stroke="rgba(255,255,255,0.08)"/>
      <text x="100" y="28" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">WORKSPACE</text>
      <text x="100" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Intelligence</text>
      <text x="100" y="70" text-anchor="middle" fill="#a0b8c0" font-size="10">Index · Twin · Memory</text>
      <text x="100" y="86" text-anchor="middle" fill="#a0b8c0" font-size="10">Causal Graph</text>
    </g>
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0a1418" stroke="rgba(255,255,255,0.08)"/>
      <text x="100" y="28" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">SAFETY</text>
      <text x="100" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Timelines</text>
      <text x="100" y="70" text-anchor="middle" fill="#a0b8c0" font-size="10">Verify · Rollback</text>
      <text x="100" y="86" text-anchor="middle" fill="#a0b8c0" font-size="10">Surgical Patches</text>
    </g>
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0a1418" stroke="rgba(255,255,255,0.08)"/>
      <text x="100" y="28" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">RUNTIME</text>
      <text x="100" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Hologram</text>
      <text x="100" y="70" text-anchor="middle" fill="#a0b8c0" font-size="10">V8 Autopsy · Replay</text>
      <text x="100" y="86" text-anchor="middle" fill="#a0b8c0" font-size="10">Bisect · Causal</text>
    </g>
    <g transform="translate(720, 0)">
      <rect x="0" y="0" width="200" height="100" rx="10" fill="#0a1418" stroke="rgba(255,255,255,0.08)"/>
      <text x="100" y="28" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">MOONSHOTS</text>
      <text x="100" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Self-Defense</text>
      <text x="100" y="70" text-anchor="middle" fill="#a0b8c0" font-size="10">Precrime · Sheriff</text>
      <text x="100" y="86" text-anchor="middle" fill="#a0b8c0" font-size="10">Spec-Code · Tribunal</text>
    </g>
  </g>

  <g stroke="rgba(0,212,232,0.25)" stroke-width="1" fill="none" stroke-dasharray="2 4">
    <path d="M 460 405 L 180 450"/>
    <path d="M 500 405 L 380 450"/>
    <path d="M 580 405 L 620 450"/>
    <path d="M 620 405 L 850 450"/>
  </g>

  <text x="40" y="170" fill="#475c64" font-size="9" letter-spacing="2" transform="rotate(-90 40 170)">USER SURFACES</text>
  <text x="40" y="500" fill="#475c64" font-size="9" letter-spacing="2" transform="rotate(-90 40 500)">CAPABILITY LAYERS</text>
</svg>
