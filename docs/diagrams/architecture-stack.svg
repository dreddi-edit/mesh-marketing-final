<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a1418"/>
      <stop offset="1" stop-color="#040a0d"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="700" fill="url(#bg)"/>

  <text x="550" y="42" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-style="italic">Mesh Internal Architecture</text>
  <text x="550" y="66" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="3">FROM USER INPUT TO PERSISTED EVIDENCE</text>

  <g transform="translate(80, 110)">
    <rect width="940" height="90" rx="8" fill="#0d1d23" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="26" fill="#7ceeff" font-size="11" letter-spacing="2">LAYER 1 · USER SURFACES</text>
    <g transform="translate(20, 42)" font-family="monospace" font-size="11" fill="#a0b8c0">
      <rect x="0" y="0" width="200" height="32" rx="6" fill="#001f26" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="100" y="20" text-anchor="middle" fill="#fff">CLI · mesh / mesh-agent</text>
      <rect x="220" y="0" width="200" height="32" rx="6" fill="#001f26" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="320" y="20" text-anchor="middle" fill="#fff">IDE · Electron + React</text>
      <rect x="440" y="0" width="200" height="32" rx="6" fill="#001f26" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="540" y="20" text-anchor="middle" fill="#fff">MCP · stdio / SSE server</text>
      <rect x="660" y="0" width="200" height="32" rx="6" fill="#001f26" stroke="#00d4e8" stroke-opacity="0.4"/>
      <text x="760" y="20" text-anchor="middle" fill="#fff">API · HTTPS gateway</text>
    </g>
  </g>

  <line x1="550" y1="205" x2="550" y2="225" stroke="#475c64" stroke-width="2" stroke-dasharray="3 3"/>

  <g transform="translate(80, 230)">
    <rect width="940" height="90" rx="8" fill="#0d1d23" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="26" fill="#7ceeff" font-size="11" letter-spacing="2">LAYER 2 · AGENT LOOP</text>
    <g transform="translate(20, 42)" font-family="monospace" font-size="11" fill="#a0b8c0">
      <rect x="0" y="0" width="220" height="32" rx="6" fill="#0a1418" stroke="rgba(255,255,255,0.15)"/>
      <text x="110" y="20" text-anchor="middle" fill="#fff">agent-loop.ts</text>
      <text x="240" y="20" fill="#475c64">→</text>
      <rect x="260" y="0" width="220" height="32" rx="6" fill="#0a1418" stroke="rgba(255,255,255,0.15)"/>
      <text x="370" y="20" text-anchor="middle" fill="#fff">context-assembler.ts</text>
      <text x="490" y="20" fill="#475c64">→</text>
      <rect x="510" y="0" width="220" height="32" rx="6" fill="#0a1418" stroke="rgba(255,255,255,0.15)"/>
      <text x="620" y="20" text-anchor="middle" fill="#fff">llm-client.ts (BYOK)</text>
      <text x="740" y="20" fill="#475c64">→</text>
      <rect x="760" y="0" width="160" height="32" rx="6" fill="#0a1418" stroke="rgba(255,255,255,0.15)"/>
      <text x="840" y="20" text-anchor="middle" fill="#fff">tool dispatch</text>
    </g>
  </g>

  <line x1="550" y1="325" x2="550" y2="345" stroke="#475c64" stroke-width="2" stroke-dasharray="3 3"/>

  <g transform="translate(80, 350)">
    <rect width="940" height="160" rx="8" fill="#0d1d23" stroke="rgba(0,212,232,0.25)"/>
    <text x="20" y="26" fill="#7ceeff" font-size="11" letter-spacing="2">LAYER 3 · LOCAL TOOL BACKEND (112+ tools)</text>
    <g transform="translate(20, 44)">
      <rect x="0" y="0" width="220" height="100" rx="6" fill="#001f26" stroke="rgba(0,212,232,0.3)"/>
      <text x="110" y="20" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">WORKSPACE</text>
      <g font-family="monospace" font-size="10" fill="#a0b8c0">
        <text x="14" y="40">workspace.index</text>
        <text x="14" y="56">workspace.patch_surgical</text>
        <text x="14" y="72">workspace.timeline_*</text>
        <text x="14" y="88">workspace.digital_twin</text>
      </g>

      <rect x="240" y="0" width="220" height="100" rx="6" fill="#001f26" stroke="rgba(0,212,232,0.3)"/>
      <text x="350" y="20" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">RUNTIME</text>
      <g font-family="monospace" font-size="10" fill="#a0b8c0">
        <text x="254" y="40">runtime.start (hologram)</text>
        <text x="254" y="56">runtime.capture_failure</text>
        <text x="254" y="72">runtime.replay_trace</text>
        <text x="254" y="88">runtime.fix_failure</text>
      </g>

      <rect x="480" y="0" width="220" height="100" rx="6" fill="#001f26" stroke="rgba(0,212,232,0.3)"/>
      <text x="590" y="20" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">MOONSHOTS</text>
      <g font-family="monospace" font-size="10" fill="#a0b8c0">
        <text x="494" y="40">workspace.self_defend</text>
        <text x="494" y="56">workspace.precrime</text>
        <text x="494" y="72">workspace.semantic_git</text>
        <text x="494" y="88">workspace.spec_code</text>
      </g>

      <rect x="720" y="0" width="180" height="100" rx="6" fill="#001f26" stroke="rgba(0,212,232,0.3)"/>
      <text x="810" y="20" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">AGENT</text>
      <g font-family="monospace" font-size="10" fill="#a0b8c0">
        <text x="734" y="40">agent.race_fixes</text>
        <text x="734" y="56">agent.spawn</text>
        <text x="734" y="72">agent.merge_verified</text>
        <text x="734" y="88">agent.plan</text>
      </g>
    </g>
  </g>

  <line x1="550" y1="515" x2="550" y2="535" stroke="#475c64" stroke-width="2" stroke-dasharray="3 3"/>

  <g transform="translate(80, 540)">
    <rect width="940" height="120" rx="8" fill="#0d1d23" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="26" fill="#7ceeff" font-size="11" letter-spacing="2">LAYER 4 · PERSISTENT EVIDENCE</text>
    <text x="20" y="44" fill="#a0b8c0" font-size="11">Project-local artifacts written to .mesh/ — reviewable, auditable, durable.</text>
    <g transform="translate(20, 60)" font-family="monospace" font-size="10" fill="#a0b8c0">
      <text x="0" y="14">.mesh/capsules/</text>
      <text x="0" y="32" fill="#475c64">workspace index</text>
      <text x="160" y="14">.mesh/timelines/</text>
      <text x="160" y="32" fill="#475c64">isolated worktrees</text>
      <text x="320" y="14">.mesh/security/</text>
      <text x="320" y="32" fill="#475c64">self-defense ledger</text>
      <text x="480" y="14">.mesh/precrime/</text>
      <text x="480" y="32" fill="#475c64">risk forecasts</text>
      <text x="630" y="14">.mesh/spec-code/</text>
      <text x="630" y="32" fill="#475c64">contract drift</text>
      <text x="780" y="14">.mesh/audit/</text>
      <text x="780" y="32" fill="#475c64">hash-chained log</text>
    </g>
  </g>
</svg>
