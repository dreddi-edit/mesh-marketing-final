<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0a1418"/>
      <stop offset="1" stop-color="#040a0d"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#a32b2b"/><stop offset="1" stop-color="#e84a4a"/>
    </linearGradient>
    <linearGradient id="goodGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#005566"/><stop offset="1" stop-color="#00d4e8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00d4e8"/>
    </marker>
  </defs>

  <rect width="1100" height="480" fill="url(#bg)"/>
  <text x="550" y="46" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-style="italic">How a Capsule Compresses Your Workspace</text>
  <text x="550" y="72" text-anchor="middle" fill="#7ceeff" font-size="11" letter-spacing="3">SCAN · PARSE · DISTILL · CAPSULE · FIT</text>

  <g transform="translate(50, 130)">
    <text x="100" y="-15" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">01 · SCAN</text>
    <rect x="0" y="0" width="200" height="240" rx="8" fill="#0d1d23" stroke="rgba(255,255,255,0.08)"/>
    <text x="100" y="22" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Raw Source</text>
    <text x="100" y="40" text-anchor="middle" fill="#475c64" font-size="10">87,030 tokens · 247 files</text>

    <g font-family="monospace" font-size="9" fill="#a0b8c0">
      <text x="14" y="68">src/auth/session.ts</text>
      <text x="14" y="86">src/auth/middleware.ts</text>
      <text x="14" y="104">src/billing/stripe.ts</text>
      <text x="14" y="122">src/billing/invoices.ts</text>
      <text x="14" y="140">src/api/router.ts</text>
      <text x="14" y="158">src/api/handlers.ts</text>
      <text x="14" y="176">src/db/migrations.ts</text>
      <text x="14" y="194">src/web/dashboard.tsx</text>
      <text x="14" y="212" fill="#475c64">... 239 more</text>
    </g>
  </g>

  <line x1="262" y1="250" x2="320" y2="250" stroke="#00d4e8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(330, 130)">
    <text x="100" y="-15" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">02 · PARSE / DISTILL</text>
    <rect x="0" y="0" width="200" height="240" rx="8" fill="#0d1d23" stroke="rgba(0,212,232,0.3)"/>
    <text x="100" y="22" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Tree-sitter AST</text>
    <text x="100" y="40" text-anchor="middle" fill="#475c64" font-size="10">symbols · signatures · edges</text>

    <g font-family="monospace" font-size="9" fill="#a0b8c0">
      <text x="14" y="68" fill="#00d4e8">refreshSession(ctx)</text>
      <text x="22" y="84" fill="#777">↳ cookies.get()</text>
      <text x="22" y="98" fill="#777">↳ isExpired()</text>
      <text x="22" y="112" fill="#777">↳ resumeWorkspace()</text>
      <text x="14" y="134" fill="#00d4e8">finalizeInvoice(id)</text>
      <text x="22" y="150" fill="#777">↳ db.invoices.find()</text>
      <text x="22" y="164" fill="#777">↳ stripe.charge()</text>
      <text x="14" y="186" fill="#00d4e8">handleWebhook(req)</text>
      <text x="22" y="202" fill="#777">↳ verifySig()</text>
      <text x="22" y="216" fill="#777">↳ processEvent()</text>
    </g>
  </g>

  <line x1="542" y1="250" x2="600" y2="250" stroke="#00d4e8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(610, 130)">
    <text x="100" y="-15" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">03 · CAPSULE</text>
    <rect x="0" y="0" width="200" height="240" rx="8" fill="#001f26" stroke="#00d4e8" stroke-opacity="0.6"/>
    <text x="100" y="22" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Compressed Capsule</text>
    <text x="100" y="40" text-anchor="middle" fill="#7ceeff" font-size="10">3,347 tokens · 247 files</text>
    
    <g transform="translate(50, 70)">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4e8" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
      <circle cx="50" cy="50" r="32" fill="#001f26" stroke="#00d4e8" stroke-width="1.5"/>
      <text x="50" y="48" text-anchor="middle" fill="#00d4e8" font-size="22" font-weight="900" font-style="italic">3.9×</text>
      <text x="50" y="64" text-anchor="middle" fill="#7ceeff" font-size="9" letter-spacing="2">RATIO</text>
    </g>

    <text x="100" y="200" text-anchor="middle" fill="#a0b8c0" font-size="10">100% recall</text>
    <text x="100" y="218" text-anchor="middle" fill="#a0b8c0" font-size="10">deterministic · no embeddings</text>
  </g>

  <line x1="822" y1="250" x2="880" y2="250" stroke="#00d4e8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(890, 130)">
    <text x="90" y="-15" text-anchor="middle" fill="#7ceeff" font-size="10" letter-spacing="2">04 · FIT</text>
    <rect x="0" y="0" width="180" height="240" rx="8" fill="#0d1d23" stroke="rgba(255,255,255,0.08)"/>
    <text x="90" y="22" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Model Budget</text>
    <text x="90" y="40" text-anchor="middle" fill="#475c64" font-size="10">6,000 token window</text>

    <text x="14" y="74" fill="#a0b8c0" font-size="10">Raw source</text>
    <rect x="14" y="80" width="152" height="14" rx="2" fill="#1a0a0a" stroke="rgba(255,255,255,0.08)"/>
    <rect x="14" y="80" width="152" height="14" rx="2" fill="url(#badGrad)"/>
    <text x="160" y="91" text-anchor="end" fill="#fff" font-size="9" font-weight="600">overflow</text>

    <text x="14" y="120" fill="#a0b8c0" font-size="10">Mesh capsule</text>
    <rect x="14" y="126" width="152" height="14" rx="2" fill="#1a1a1a" stroke="rgba(255,255,255,0.08)"/>
    <rect x="14" y="126" width="85" height="14" rx="2" fill="url(#goodGrad)"/>
    <text x="100" y="137" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">55.8%</text>

    <text x="90" y="172" text-anchor="middle" fill="#7ceeff" font-size="10">2,653T headroom</text>
    <text x="90" y="190" text-anchor="middle" fill="#7ceeff" font-size="10">100% recall</text>
    <text x="90" y="218" text-anchor="middle" fill="#a0b8c0" font-size="9">model can answer</text>
  </g>

  <g transform="translate(50, 410)">
    <text x="0" y="0" fill="#7ceeff" font-size="11" letter-spacing="2">RESULT</text>
    <text x="0" y="22" fill="#fff" font-size="14">26× more files fit. 100% recall. Same model. Same prompt.</text>
  </g>
</svg>
