  <rect x="150" y="400" width="800" height="55" fill="#161b22" rx="10" stroke="#3fb950" stroke-width="1"></rect>
  <text x="550" y="425" text-anchor="middle" fill="#e6edf3" font-size="16">Bei $3/MTok (Sonnet-class): Raw = $3.00  →  Mesh = $0.83</text>
