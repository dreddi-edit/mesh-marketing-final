<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Mesh — the AI-native IDE and MCP context server">
  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B14"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accentDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C4A0"/>
      <stop offset="100%" stop-color="#8A7CFF"/>
    </linearGradient>
    <radialGradient id="glowDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A7CFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8A7CFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridDark" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bgDark)"/>
  <rect width="1280" height="400" fill="url(#gridDark)"/>
  <circle cx="980" cy="200" r="260" fill="url(#glowDark)"/>

  <!-- Capsule visualization (right side) -->
  <g transform="translate(820, 90)" opacity="0.9">
    <!-- Raw file cards (chaotic, behind) -->
    <g opacity="0.35">
      <rect x="0" y="10" width="120" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="20" y="42" width="160" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="10" y="74" width="140" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="40" y="106" width="130" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="5" y="138" width="170" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <rect x="25" y="170" width="120" height="22" rx="3" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(210, 95)">
      <path d="M 0 0 L 60 0 M 50 -8 L 60 0 L 50 8" stroke="url(#accentDark)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Compressed capsules (clean, front) -->
    <g transform="translate(290, 0)">
      <rect x="0" y="20" width="140" height="50" rx="8" fill="#00C4A0" fill-opacity="0.12" stroke="#00C4A0" stroke-opacity="0.6" stroke-width="1.2"/>
      <circle cx="18" cy="45" r="5" fill="#00C4A0"/>
      <rect x="32" y="37" width="90" height="4" rx="2" fill="#ffffff" fill-opacity="0.75"/>
      <rect x="32" y="48" width="60" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.35"/>

      <rect x="0" y="85" width="140" height="50" rx="8" fill="#8A7CFF" fill-opacity="0.12" stroke="#8A7CFF" stroke-opacity="0.6" stroke-width="1.2"/>
      <circle cx="18" cy="110" r="5" fill="#8A7CFF"/>
      <rect x="32" y="102" width="80" height="4" rx="2" fill="#ffffff" fill-opacity="0.75"/>
      <rect x="32" y="113" width="70" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.35"/>

      <rect x="0" y="150" width="140" height="50" rx="8" fill="#00C4A0" fill-opacity="0.12" stroke="#00C4A0" stroke-opacity="0.6" stroke-width="1.2"/>
      <circle cx="18" cy="175" r="5" fill="#00C4A0"/>
      <rect x="32" y="167" width="95" height="4" rx="2" fill="#ffffff" fill-opacity="0.75"/>
      <rect x="32" y="178" width="55" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.35"/>
    </g>
  </g>

  <!-- Mesh bracket logo -->
  <g transform="translate(90, 112)">
    <path d="M10 10 L 0 30 L 10 50" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M46 10 L 56 30 L 46 50" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="30" r="3.5" fill="url(#accentDark)"/>
  </g>

  <!-- Wordmark -->
  <text x="168" y="168" font-family="'Trebuchet MS', 'Helvetica Neue', sans-serif" font-weight="700" font-size="84" fill="#ffffff" letter-spacing="-2">Mesh.</text>

  <!-- Tagline -->
  <text x="90" y="230" font-family="'Trebuchet MS', 'Helvetica Neue', sans-serif" font-weight="400" font-size="24" fill="#F7F5F0" fill-opacity="0.92">The AI-native IDE with a structural context engine.</text>
  <text x="90" y="262" font-family="'Trebuchet MS', 'Helvetica Neue', sans-serif" font-weight="400" font-size="18" fill="#F7F5F0" fill-opacity="0.55">Full-repo awareness at a fraction of the tokens. Editor. Terminal. Voice. MCP.</text>

  <!-- Stats pills -->
  <g font-family="'Menlo', 'Consolas', monospace" font-size="12" font-weight="600">
    <g transform="translate(90, 308)">
      <rect width="150" height="34" rx="17" fill="#00C4A0" fill-opacity="0.12" stroke="#00C4A0" stroke-opacity="0.5"/>
      <text x="16" y="22" fill="#00C4A0">3.6× MORE CONTEXT</text>
    </g>
    <g transform="translate(250, 308)">
      <rect width="128" height="34" rx="17" fill="#8A7CFF" fill-opacity="0.12" stroke="#8A7CFF" stroke-opacity="0.5"/>
      <text x="16" y="22" fill="#8A7CFF">100% NIAH RECALL</text>
    </g>
    <g transform="translate(388, 308)">
      <rect width="142" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.3"/>
      <text x="16" y="22" fill="#F7F5F0">0% HALLUCINATION</text>
    </g>
    <g transform="translate(540, 308)">
      <rect width="110" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.3"/>
      <text x="16" y="22" fill="#F7F5F0">MCP-NATIVE</text>
    </g>
  </g>
</svg>
