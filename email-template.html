<!DOCTYPE html>

    }
    .container {
      max-width: 600px;

    p { line-height: 1.6; color: #a1b8bc; }

      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #107284;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://mesh.dev/assets/brand/lockup-white.png" alt="Mesh" height="30" style="margin-bottom: 20px;">

</html>
